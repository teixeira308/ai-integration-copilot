services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      PORT: 8080
      GEMINI_MODEL: gemini-3.1-flash-lite-preview
      GEMINI_BASE_URL: https://generativelanguage.googleapis.com
      GEMINI_TIMEOUT: 5m
      GEMINI_API_KEY: ${GEMINI_API_KEY}
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    depends_on:
      - backend
    ports:
      - "3000:80"
